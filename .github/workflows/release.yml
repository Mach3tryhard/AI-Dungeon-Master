name: Build and Upload Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller textual

        if (Test-Path -Path 'requirements.txt') { pip install -r requirements.txt }
      shell: pwsh

    - name: Build EXE cu PyInstaller
      run: |
        pyinstaller --onefile --paths . --add-data "UI\style.tcss;UI" UI/tui.py
      shell: pwsh

    - name: Împachetează Executabilul și Codul Sursă (pentru AI)
      run: |
        New-Item -ItemType Directory -Path "DND_Release"
        
        Copy-Item -Path "dist\tui.exe" -Destination "DND_Release\"
        
        Copy-Item -Path "UI" -Destination "DND_Release\UI" -Recurse
        if (Test-Path -Path 'tests') { Copy-Item -Path "tests" -Destination "DND_Release\tests" -Recurse }
        Copy-Item -Path "*.py" -Destination "DND_Release\"
        
        Compress-Archive -Path "DND_Release\*" -DestinationPath "DND_Game.zip"
      shell: pwsh

    - name: Upload ZIP to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: DND_Game.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}