name: Build Python to EXE

on:
  push:
    branches: [ "main" ] 
  workflow_dispatch:     

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        # Instalează dependențele proiectului tău dacă ai un requirements.txt
        if (Test-Path -Path 'requirements.txt') { pip install -r requirements.txt }
      shell: pwsh

    - name: Build EXE with PyInstaller
      run: |
        # --onefile ambalează totul într-un singur .exe
        # --windowed ascunde consola (folosește-l doar dacă e aplicație cu interfață grafică)
        pyinstaller --onefile UI/tui.py
      shell: pwsh

    - name: Upload EXE as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-python-app-windows
        path: dist/main.exe
        retention-days: 7 
